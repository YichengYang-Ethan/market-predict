name: Refresh market snapshots

# Pushes snapshot JSON to a dedicated `snapshots` branch (NOT main) so the
# Streamlit Cloud webhook doesn't trigger a redeploy every 15 min. The
# Streamlit app reads snapshots from raw.githubusercontent.com/.../snapshots.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout main (for code)
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install
        run: pip install -e .

      - name: Build snapshots
        run: python -m market_predict.refresh_snapshot

      - name: Push snapshots to dedicated branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "snapshot-bot"
          git config user.email "snapshot-bot@users.noreply.github.com"

          # Stash the freshly built snapshots somewhere outside the worktree
          mkdir -p /tmp/snaps
          cp data/snapshot_*.json /tmp/snaps/

          # Either fetch the existing `snapshots` branch, or create it orphan
          if git ls-remote --exit-code --heads origin snapshots >/dev/null 2>&1; then
            git fetch origin snapshots:snapshots
            git checkout snapshots
            git rm -rf data/ 2>/dev/null || true
          else
            git checkout --orphan snapshots
            # Wipe the working tree (orphan inherits main's files)
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p data
          cp /tmp/snaps/*.json data/

          git add data/
          if ! git diff --quiet --cached; then
            git commit -m "snap: $(date -u +%FT%TZ)"
            git push origin snapshots
          else
            echo "No snapshot diffs — skipping commit."
          fi

      - name: Ping Streamlit app to keep warm
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            https://market-predict.streamlit.app/ || true
